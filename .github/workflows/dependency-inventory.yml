# Reusable dependency & tooling inventory (ENG-0015).
#
# Consumers call this per ENG-0004's delivery model:
#
#   jobs:
#     dependency-inventory:
#       uses: qwts/playbook-engineering/.github/workflows/dependency-inventory.yml@v1
#
# The caller repo provides its own dependency-inventory.config.json; Syft
# produces a CycloneDX SBOM (license detection lives there, not in our code),
# and the normalizer — fetched from this repo, zero-install like docs-gov —
# folds it together with the caller's GitHub Actions and tool-config files into
# the playbook inventory schema. Report-only: this never fails the caller's
# build. License enforcement stays with osv-scanner / cargo-deny (ENG-0005).
name: Dependency inventory

on:
  workflow_call:
    inputs:
      config:
        description: Path to the caller's dependency-inventory config
        type: string
        default: dependency-inventory.config.json
      tooling-ref:
        description: Ref of qwts/playbook-engineering to take the normalizer from
        type: string
        default: v1
      use-local-tooling:
        description: Run the normalizer from the caller's own checkout (this repo's self-test; exercises the un-tagged tooling before v1 moves)
        type: boolean
        default: false
      fail-on-error:
        description: Fail the job when Syft or the normalizer errors. Default false — this is a report-only inventory and must not turn into a red CI check for consumers. This repo's own self-test sets it true so a broken change is caught here.
        type: boolean
        default: false

jobs:
  dependency-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # Runs before the tooling fetch so Syft scans only the caller's own
      # manifests, never this repo's package-lock.json checked out below.
      # Report-only for consumers (continue-on-error), blocking for the self-test.
      - name: Generate SBOM (CycloneDX)
        continue-on-error: ${{ !inputs.fail-on-error }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dependency-sbom.cyclonedx.json
          # This workflow only promises the normalized inventory artifact — stop
          # Syft from uploading its own workflow artifact or attaching a raw SBOM
          # to a consumer's release (upload-release-assets defaults to true).
          upload-artifact: false
          upload-release-assets: false

      - name: Fetch inventory tooling
        if: ${{ !inputs.use-local-tooling }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: qwts/playbook-engineering
          ref: ${{ inputs.tooling-ref }}
          path: .dep-inventory/tooling
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Run inventory normalizer
        continue-on-error: ${{ !inputs.fail-on-error }}
        env:
          # Expanded via env, never inlined into the script — the ENG-0005
          # workflow-injection lesson.
          CONFIG: ${{ inputs.config }}
          USE_LOCAL: ${{ inputs.use-local-tooling }}
          REPO: ${{ github.event.repository.name }}
          # The commit the inventory reflects — a CI-provided, per-commit stable
          # provenance stamp, so re-runs of the same commit diff to nothing.
          GENERATED_AT: ${{ github.sha }}
        run: |
          if [ "$USE_LOCAL" = "true" ]; then
            CLI=tools/dependency-inventory/inventory.mjs
          else
            CLI=.dep-inventory/tooling/tools/dependency-inventory/inventory.mjs
          fi
          node "$CLI" \
            --sbom dependency-sbom.cyclonedx.json \
            --config "$CONFIG" \
            --repo "$REPO" \
            --generated-at "$GENERATED_AT" \
            --report dependency-inventory.json

      - name: Upload inventory
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-inventory
          path: dependency-inventory.json
          if-no-files-found: ignore
